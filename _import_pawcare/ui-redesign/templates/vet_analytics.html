{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="mobile-shell">
    <div class="mobile-header">
      <div class="mobile-header__title">Analytics</div>
    </div>

    <div class="grid-2">
      <div class="card" style="text-align:center;">
        <div class="pet-row__icon" style="margin:0 auto;">✅</div>
        <div style="font-size:20px; font-weight:700;">{{ stats.completed }}</div>
        <div class="muted">Completed</div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="pet-row__icon" style="margin:0 auto;">📅</div>
        <div style="font-size:20px; font-weight:700;">{{ stats.scheduled }}</div>
        <div class="muted">Scheduled</div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="pet-row__icon" style="margin:0 auto;">🕒</div>
        <div style="font-size:20px; font-weight:700;">{{ stats.pending }}</div>
        <div class="muted">Pending</div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="pet-row__icon" style="margin:0 auto;">▶</div>
        <div style="font-size:20px; font-weight:700;">{{ stats.in_progress }}</div>
        <div class="muted">In Progress</div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div style="font-weight:700;">Total Appointments</div>
      <div style="font-size:22px; font-weight:800;">{{ stats.total }}</div>
    </div>

    <div class="bottom-nav">
      <a href="{{ url_for('vet.vet_home') }}">🏠<br>Home</a>
      <a href="{{ url_for('vet.vet_appointments') }}">📅<br>Appts</a>
      <a href="{{ url_for('vet.vet_patients') }}">🐾<br>Patients</a>
      <a href="{{ url_for('vet.vet_chat') }}">💬<br>Chat</a>
      <a class="active" href="{{ url_for('vet.vet_analytics') }}">Analytics</a>
    </div>
  </div>
</div>

{% endblock %}
