{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="mobile-shell">
    <div class="mobile-header">
      <div class="mobile-header__title">Profile</div>
    </div>

    <div class="card">
      <div class="pet-row__left">
        <div class="pet-row__icon">👩‍⚕️</div>
        <div>
          <div style="font-weight:700;">{{ profile.FullName or session.get('full_name') }}</div>
          <div class="muted">{{ profile.ClinicName or 'General Practice' }}</div>
        </div>
      </div>
      <div class="divider"></div>
      <form method="post" class="form">
        <div class="grid-2">
          <div class="form__row">
            <label class="label">Full Name</label>
            <input class="input" name="full_name" value="{{ profile.FullName or session.get('full_name') }}" />
          </div>
          <div class="form__row">
            <label class="label">Phone</label>
            <input class="input" name="phone" value="{{ profile.Phone or '' }}" />
          </div>
          <div class="form__row">
            <label class="label">Clinic</label>
            <input class="input" name="clinic_name" value="{{ profile.ClinicName or '' }}" />
          </div>
          <div class="form__row">
            <label class="label">License No</label>
            <input class="input" name="license_no" value="{{ profile.LicenseNo or '' }}" />
          </div>
          <div class="form__row">
            <label class="label">Clinic Phone</label>
            <input class="input" name="clinic_phone" value="{{ profile.ClinicPhone or '' }}" />
          </div>
          <div class="form__row">
            <label class="label">Bio</label>
            <input class="input" name="bio" value="{{ profile.Bio or '' }}" />
          </div>
        </div>
        <label class="check" style="margin-top:10px;">
          <input type="checkbox" name="is_online" {% if profile.IsOnline %}checked{% endif %} />
          <span>Available for appointments</span>
        </label>
        <div class="form__actions">
          <button class="btn primary" type="submit">Save</button>
        </div>
      </form>
    </div>

    <div class="bottom-nav">
      <a href="{{ url_for('vet.vet_home') }}">Home</a>
      <a href="{{ url_for('vet.vet_appointments') }}">Appointments</a>
      <a href="{{ url_for('vet.vet_patients') }}">Patients</a>
      <a href="{{ url_for('vet.vet_chat') }}">Chat</a>
      <a class="active" href="{{ url_for('vet.vet_profile') }}">Profile</a>
    </div>
  </div>
</div>

{% endblock %}
