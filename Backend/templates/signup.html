{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="card">
    <h2 class="card__title">Signup</h2>
    <p class="card__subtitle">Create an account as Owner or Vet.</p>

    <form method="post" class="form" id="signup-form">
      <div class="grid-2">
        <div class="form__row">
          <label class="label">FullName</label>
          <input class="input" name="full_name" required />
        </div>

        <div class="form__row">
          <label class="label">Phone (optional)</label>
          <input class="input" name="phone" />
        </div>

        <div class="form__row">
          <label class="label">Email</label>
          <input class="input" name="email" type="email" required />
        </div>

        <div class="form__row grid-span-2">
          <label class="label">I am a</label>
          <div class="role-toggle">
            <input type="radio" id="role-owner" name="role" value="owner" checked />
            <label for="role-owner">Pet Owner</label>
            <input type="radio" id="role-vet" name="role" value="vet" />
            <label for="role-vet">Veterinarian</label>
          </div>
        </div>

        <div class="form__row">
          <label class="label">Password</label>
          <input class="input" name="password" type="password" required />
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-head" id="vet-section-head">
        <h3 class="section-head__title">Vet Profile (only if role=vet)</h3>
        <p class="section-head__subtitle">ClinicName and LicenseNo are optional in DB, but you can collect them here.</p>
      </div>

      <div class="grid-2" id="vet-fields">
        <div class="form__row">
          <label class="label">ClinicName</label>
          <input class="input" name="clinic_name" placeholder="Optional" />
        </div>

        <div class="form__row">
          <label class="label">LicenseNo</label>
          <input class="input" name="license_no" placeholder="Recommended" />
        </div>

        <div class="form__row grid-span-2">
          <label class="label">Bio</label>
          <textarea class="textarea" name="bio"></textarea>
        </div>
      </div>

      <div class="form__actions">
        <button class="btn primary" type="submit">Create Account</button>
        <a class="btn ghost" href="{{ url_for('auth.login') }}">Back to login</a>
      </div>
    </form>
  </div>
</div>

<script>
  const vetFields = document.getElementById('vet-fields');
  const vetHead = document.getElementById('vet-section-head');
  const roleOwner = document.getElementById('role-owner');
  const roleVet = document.getElementById('role-vet');

  function toggleVet() {
    const isVet = roleVet.checked;
    vetFields.classList.toggle('hidden', !isVet);
    vetHead.classList.toggle('hidden', !isVet);
  }

  roleOwner.addEventListener('change', toggleVet);
  roleVet.addEventListener('change', toggleVet);
  toggleVet();
</script>

{% endblock %}
