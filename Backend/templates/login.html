{% extends "base.html" %}
{% block content %}

<div class="page">
  <div class="card card--center">
    <h2 class="card__title">Login</h2>
    <p class="card__subtitle">Enter your email and password.</p>

    <form method="post" class="form">
      <div class="form__row">
        <label class="label">I am a</label>
        <div class="role-toggle">
          <input type="radio" id="login-owner" name="login_role" value="owner" checked />
          <label for="login-owner">Pet Owner</label>
          <input type="radio" id="login-vet" name="login_role" value="vet" />
          <label for="login-vet">Veterinarian</label>
        </div>
      </div>
      <div class="form__row">
        <label class="label">Email</label>
        <input class="input" name="email" type="email" required />
      </div>

      <div class="form__row">
        <label class="label">Password</label>
        <input class="input" name="password" type="password" required />
      </div>

      <div class="form__actions">
        <button class="btn primary" type="submit">Login</button>
        <a class="btn ghost" href="{{ url_for('auth.signup') }}">Create account</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
